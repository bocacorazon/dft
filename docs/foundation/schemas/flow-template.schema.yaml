$schema: https://json-schema.org/draft/2020-12/schema
$id: https://dark-factory-toolkit.local/schemas/flow-template.schema.yaml
title: FlowTemplate
type: object
additionalProperties: false
required:
  - flow
  - lane
  - steps
properties:
  flow:
    type: object
    additionalProperties: false
    required:
      - name
      - version
    properties:
      name:
        type: string
      version:
        type: string
      description:
        type: string
  lane:
    type: string
    enum:
      - streamlined
      - spec
      - recursive
  parameters:
    type: object
    additionalProperties: true
  model_defaults:
    type: object
    additionalProperties: false
    properties:
      provider:
        type: string
      model:
        type: string
      temperature:
        type: number
        minimum: 0
  steps:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - run
      properties:
        id:
          type: string
          pattern: ^[a-z][a-z0-9-]*$
        depends_on:
          type: array
          items:
            type: string
        setup:
          type: array
          items:
            $ref: '#/$defs/runnable'
        run:
          $ref: '#/$defs/runnable'
        capture:
          type: boolean
          default: true
        outputs:
          type: array
          items:
            type: string
        verification:
          type: array
          items:
            allOf:
              - $ref: '#/$defs/runnable'
              - type: object
                properties:
                  on_error:
                    type: string
                    enum:
                      - continue
                      - break
                      - retry
        retry:
          type: object
          additionalProperties: false
          properties:
            max_attempts:
              type: integer
              minimum: 1
            backoff_seconds:
              type: integer
              minimum: 0
$defs:
  runnable:
    type: object
    additionalProperties: false
    required:
      - type
    properties:
      type:
        type: string
        enum:
          - agent
          - tool
          - function
          - workflow
      name:
        type: string
      prompt:
        type: string
      args:
        type: object
        additionalProperties: true
      model:
        type: object
        additionalProperties: false
        properties:
          provider:
            type: string
          model:
            type: string
          temperature:
            type: number
            minimum: 0