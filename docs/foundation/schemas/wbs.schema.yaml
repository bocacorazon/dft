$schema: https://json-schema.org/draft/2020-12/schema
$id: https://dark-factory-toolkit.local/schemas/wbs.schema.yaml
title: WorkBreakdownStructure
type: object
additionalProperties: false
required:
  - id
  - demand_package_id
  - lane
  - complexity_assessment
  - tasks
properties:
  id:
    type: string
    pattern: ^wbs-[a-z0-9][a-z0-9-]*$
  demand_package_id:
    type: string
    pattern: ^dp-[a-z0-9][a-z0-9-]*$
  architecture_blueprint_ref:
    type: string
  eval_plan_ref:
    type: string
  lane:
    type: string
    enum:
      - streamlined
      - spec
      - recursive
  complexity_assessment:
    type: object
    additionalProperties: false
    required:
      - score
      - rationale
      - signals
    properties:
      score:
        type: integer
        minimum: 1
        maximum: 5
      rationale:
        type: string
      signals:
        type: array
        items:
          type: string
  tasks:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - description
        - flow_template
        - acceptance_criteria_refs
      properties:
        id:
          type: string
          pattern: ^task-[0-9]+$
        title:
          type: string
        description:
          type: string
        depends_on:
          type: array
          items:
            type: string
            pattern: ^task-[0-9]+$
        flow_template:
          type: string
        inputs:
          type: object
          additionalProperties: true
        expected_outputs:
          type: array
          items:
            type: string
        acceptance_criteria_refs:
          type: array
          items:
            type: string
            pattern: ^ac-[0-9]+$
        risk:
          type: string
          enum:
            - low
            - medium
            - high
        size:
          type: string
          enum:
            - small
            - medium
            - large