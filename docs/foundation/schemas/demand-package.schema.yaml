$schema: https://json-schema.org/draft/2020-12/schema
$id: https://dark-factory-toolkit.local/schemas/demand-package.schema.yaml
title: DemandPackage
type: object
additionalProperties: false
required:
  - id
  - version
  - title
  - kind
  - summary
  - target_artifact
  - scope
  - acceptance_criteria
properties:
  id:
    type: string
    pattern: ^dp-[a-z0-9][a-z0-9-]*$
  version:
    type: string
  title:
    type: string
    minLength: 1
  kind:
    type: string
    enum:
      - project
      - feature
      - product_increment
      - bug_fix
      - refactor
      - research
  summary:
    type: string
    minLength: 1
  target_artifact:
    type: object
    additionalProperties: false
    required:
      - name
      - description
    properties:
      name:
        type: string
      description:
        type: string
      repository:
        type: string
      runtime_context:
        type: string
  stakeholders:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - role
      properties:
        name:
          type: string
        role:
          type: string
  scope:
    type: object
    additionalProperties: false
    required:
      - in_scope
      - out_of_scope
    properties:
      in_scope:
        type: array
        items:
          type: string
      out_of_scope:
        type: array
        items:
          type: string
  goals:
    type: array
    items:
      type: string
  non_goals:
    type: array
    items:
      type: string
  assumptions:
    type: array
    items:
      type: string
  constraints:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - statement
        - category
      properties:
        id:
          type: string
          pattern: ^con-[0-9]+$
        category:
          type: string
          enum:
            - technical
            - product
            - operational
            - security
            - compliance
            - timeline
            - cost
        statement:
          type: string
  risks:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - description
        - severity
      properties:
        id:
          type: string
          pattern: ^risk-[0-9]+$
        description:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - statement
        - priority
        - verification
      properties:
        id:
          type: string
          pattern: ^ac-[0-9]+$
        statement:
          type: string
          minLength: 1
        priority:
          type: string
          enum:
            - must
            - should
            - could
        category:
          type: string
          enum:
            - functional
            - non_functional
            - usability
            - performance
            - security
            - reliability
            - maintainability
            - documentation
        verification:
          type: object
          additionalProperties: false
          required:
            - method
            - evidence
          properties:
            method:
              type: string
              enum:
                - automated_test
                - static_analysis
                - manual_review
                - artifact_inspection
                - generated_eval
            evidence:
              type: string
            notes:
              type: string