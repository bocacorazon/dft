flow:
  name: flow-name
increment: {increment-slug}
lane: sdd
steps:
  - {step-slug}
    setup:
      - type : agent|tool|function|workflow
        prompt: prompt
        args:
          - {arg-slug}
    type : agent|tool|function|workflow
    prompt: prompt
    capture: true|false
    args:
      - {arg-slug}
    verification:
       - type : agent|tool|function|workflow
         prompt: prompt
         args:
           - {arg-slug}
         on_error: continue|break|retry
  - {step-slug}