contract: planning-workflow-io
version: 1

types:
  setup_plan_output:
    type: object
    required: [FEATURE_SPEC, IMPL_PLAN, SPECS_DIR, BRANCH]
    properties:
      FEATURE_SPEC: { type: string }
      IMPL_PLAN: { type: string }
      SPECS_DIR: { type: string }
      BRANCH: { type: string }

  hook:
    type: object
    required: [extension, command, optional]
    properties:
      extension: { type: string }
      command: { type: string }
      optional: { type: boolean }
      enabled: { type: boolean, default: true }
      condition: { type: [string, "null"] }

  artifact_report:
    type: object
    required: [branch, impl_plan, artifacts]
    properties:
      branch: { type: string }
      impl_plan: { type: string }
      artifacts:
        type: array
        items: { type: string }
